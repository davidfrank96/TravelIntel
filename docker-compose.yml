version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-travel_secure_pass}
      POSTGRES_DB: ${DB_NAME:-travel_advisories}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build: .
    restart: always
    command: python main.py --schedule 6
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-travel_secure_pass}
      - DB_NAME=${DB_NAME:-travel_advisories}
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  dashboard:
    build: .
    restart: always
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - db
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-travel_secure_pass}
      - DB_NAME=${DB_NAME:-travel_advisories}

volumes:
  postgres_data: